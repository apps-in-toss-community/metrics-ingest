# metrics-ingest — wrangler configuration
#
# Two environments: staging (verification) and production (public).
# D1 / KV IDs are filled in after `wrangler d1 create` and `wrangler kv namespace create`
# during the provisioning PR.

name = "metrics-ingest"
main = "src/index.ts"
compatibility_date = "2026-05-11"

# No top-level bindings — all per-env below.

# ---------------------------------------------------------------------------
# staging environment — t-staging.aitc.dev
# ---------------------------------------------------------------------------
[env.staging]
routes = [
  { pattern = "t-staging.aitc.dev", custom_domain = true },
]

[env.staging.vars]
TS_SKEW_MS = "86400000"     # 24h
RETENTION_DAYS = "90"
DAILY_ROW_THRESHOLD = "5000"   # alert if staging receives > 5k events/day
RATE_LIMIT_BACKEND = "d1"      # validate D1 atomic UPSERT path on staging before prod

[env.staging.triggers]
crons = ["0 3 * * *"]

[[env.staging.d1_databases]]
binding = "EVENTS_DB"
database_name = "aitc-metrics-staging"
database_id = "a67fa33f-f678-4c2c-aa40-88c8382b9605"

[[env.staging.kv_namespaces]]
binding = "RATELIMIT_KV"
id = "8fdfd6c07c254e10aaea4d325441f089"

# ---------------------------------------------------------------------------
# production environment — t.aitc.dev
# ---------------------------------------------------------------------------
[env.production]
routes = [
  { pattern = "t.aitc.dev", custom_domain = true },
]

[env.production.vars]
TS_SKEW_MS = "86400000"
RETENTION_DAYS = "90"
DAILY_ROW_THRESHOLD = "50000"  # alert if production receives > 50k events/day
RATE_LIMIT_BACKEND = "d1"      # D1 atomic UPSERT — validated on staging 2026-05-13 (PR #5)
# ABUSE_ALERT_WEBHOOK = "https://..."  # set via `wrangler secret put` if needed

[env.production.triggers]
crons = ["0 3 * * *"]

[[env.production.d1_databases]]
binding = "EVENTS_DB"
database_name = "aitc-metrics"
database_id = "a330e02d-8726-4049-8f5b-bc77cfcb4c07"

[[env.production.kv_namespaces]]
binding = "RATELIMIT_KV"
id = "54253b7fde5141bcb9c583f69312e891"
